name: Build and release portable EXE

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 1.0.0"
        required: true
        default: "1.0.0"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build Windows portable EXE
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve release version
        id: version
        shell: pwsh
        run: |
          $InputVersion = '${{ github.event.inputs.version }}'
          if ([string]::IsNullOrWhiteSpace($InputVersion)) {
            $InputVersion = (Get-Content package.json | ConvertFrom-Json).version
          }

          if ($InputVersion -notmatch '^\d+\.\d+\.\d+([-.][0-9A-Za-z.-]+)?$') {
            throw "Invalid version '$InputVersion'. Use a semantic version like 1.0.0."
          }

          "version=$InputVersion" >> $env:GITHUB_OUTPUT
          "tag=v$InputVersion" >> $env:GITHUB_OUTPUT
          "asset_name=gerador-relatorio-notas-v$InputVersion-portable.exe" >> $env:GITHUB_OUTPUT

      - name: Install dependencies
        run: npm ci

      - name: Build portable EXE
        run: npm run tauri:build

      - name: Prepare release asset
        shell: pwsh
        run: |
          $Source = "src-tauri/target/release/gerador-relatorio-notas.exe"
          if (-not (Test-Path $Source)) {
            throw "Portable EXE was not found at $Source"
          }

          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item $Source "release/${{ steps.version.outputs.asset_name }}"

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Gerador de Relatorio de Notas ${{ steps.version.outputs.version }}
          body: |
            Build automatico do executavel portatil Windows.

            Commit: ${{ github.sha }}
          files: release/${{ steps.version.outputs.asset_name }}
          make_latest: true
          fail_on_unmatched_files: true
          generate_release_notes: true
